<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Family Academy — Your Learning Room</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{overflow:hidden;background:#1a0f07;font-family:'Georgia',serif;}
  #canvas{display:block;width:100vw;height:100vh;cursor:grab;}
  #canvas:active{cursor:grabbing;}

  /* ── Loading screen ── */
  #loader{
    position:fixed;inset:0;z-index:1000;
    background:#0d0803;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity 1.2s ease;
  }
  #loader.fade-out{opacity:0;pointer-events:none;}
  .loader-logo{
    font-size:2.4rem;color:#f0c070;letter-spacing:.18em;text-transform:uppercase;
    font-family:'Georgia',serif;margin-bottom:1.2rem;opacity:0;
    animation:fadeUp .8s .3s forwards;
  }
  .loader-sub{color:#a07840;font-size:.85rem;letter-spacing:.35em;text-transform:uppercase;
    margin-bottom:3rem;opacity:0;animation:fadeUp .8s .6s forwards;}
  .loader-bar-wrap{width:260px;height:2px;background:#2a1a0a;border-radius:2px;overflow:hidden;}
  .loader-bar{height:100%;width:0%;background:linear-gradient(90deg,#c08030,#f0c070);
    border-radius:2px;transition:width .1s linear;}
  .loader-tip{color:#604020;font-size:.72rem;margin-top:1.4rem;letter-spacing:.15em;
    opacity:0;animation:fadeUp .8s 1s forwards;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* ── HUD ── */
  #hud{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    display:flex;gap:10px;align-items:center;
    background:rgba(10,6,2,.72);border:1px solid rgba(200,150,60,.25);
    border-radius:50px;padding:8px 22px;
    font-size:.72rem;color:#c09050;letter-spacing:.12em;
    backdrop-filter:blur(8px);
    opacity:0;transition:opacity .6s;pointer-events:none;
  }
  #hud.show{opacity:1;}
  .hud-sep{width:1px;height:14px;background:rgba(200,150,60,.25);}
  .hud-key{
    background:rgba(200,150,60,.15);border:1px solid rgba(200,150,60,.3);
    border-radius:4px;padding:1px 6px;font-size:.68rem;color:#e0b060;
  }

  /* ── Zone label ── */
  #zone-label{
    position:fixed;top:32px;left:50%;transform:translateX(-50%);
    font-family:'Georgia',serif;font-size:.8rem;color:#d0a050;
    letter-spacing:.3em;text-transform:uppercase;
    opacity:0;transition:opacity .8s;pointer-events:none;
    text-shadow:0 0 20px rgba(200,130,30,.5);
  }
  #zone-label.show{opacity:1;}

  /* ── Crosshair ── */
  #crosshair{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    width:18px;height:18px;pointer-events:none;opacity:0;transition:opacity .4s;
  }
  #crosshair::before,#crosshair::after{
    content:'';position:absolute;background:#e0c080;border-radius:2px;opacity:.6;
  }
  #crosshair::before{width:2px;height:18px;left:8px;top:0;}
  #crosshair::after{width:18px;height:2px;left:0;top:8px;}
  #crosshair.show{opacity:.5;}

  /* ── Overlay panel (book content, downloads) ── */
  #overlay{
    position:fixed;inset:0;z-index:500;
    background:rgba(8,4,1,.88);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .5s;
    backdrop-filter:blur(6px);
  }
  #overlay.show{opacity:1;pointer-events:all;}
  .overlay-card{
    background:linear-gradient(135deg,#1e1208,#150c05);
    border:1px solid rgba(200,150,60,.35);
    border-radius:16px;padding:40px 48px;max-width:640px;width:90%;
    max-height:84vh;overflow-y:auto;
    box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(200,150,60,.15);
    position:relative;
  }
  .overlay-card::-webkit-scrollbar{width:4px;}
  .overlay-card::-webkit-scrollbar-track{background:transparent;}
  .overlay-card::-webkit-scrollbar-thumb{background:#604020;border-radius:4px;}
  .overlay-close{
    position:absolute;top:16px;right:20px;
    background:none;border:none;color:#a07040;font-size:1.4rem;cursor:pointer;
    transition:color .2s;
  }
  .overlay-close:hover{color:#f0c070;}
  .overlay-title{
    font-family:'Georgia',serif;font-size:1.6rem;color:#f0c070;
    margin-bottom:6px;letter-spacing:.05em;
  }
  .overlay-sub{font-size:.78rem;color:#806040;letter-spacing:.18em;text-transform:uppercase;
    margin-bottom:24px;border-bottom:1px solid rgba(200,150,60,.15);padding-bottom:16px;}
  .overlay-body{color:#c0a070;font-size:.92rem;line-height:1.8;}
  .overlay-body h3{color:#f0c070;font-size:1.05rem;margin:20px 0 8px;}
  .overlay-body ul{padding-left:1.2em;}
  .overlay-body ul li{margin-bottom:6px;}
  .overlay-body p{margin-bottom:10px;}

  /* download buttons */
  .dl-section-title{
    color:#f0c070;font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;
    margin:22px 0 10px;border-left:2px solid #c08030;padding-left:10px;
  }
  .dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .dl-btn{
    display:flex;align-items:center;gap:8px;padding:10px 14px;
    background:rgba(200,150,60,.1);border:1px solid rgba(200,150,60,.25);
    border-radius:8px;color:#d0a060;font-size:.8rem;text-decoration:none;
    transition:all .2s;cursor:pointer;
  }
  .dl-btn:hover{background:rgba(200,150,60,.2);border-color:rgba(200,150,60,.5);color:#f0c070;transform:translateY(-1px);}
  .dl-btn .icon{font-size:1.1rem;flex-shrink:0;}

  /* ── Hotspot tooltip ── */
  #tooltip{
    position:fixed;padding:6px 14px;background:rgba(10,6,2,.85);
    border:1px solid rgba(200,150,60,.3);border-radius:20px;
    color:#e0b060;font-size:.75rem;letter-spacing:.12em;
    pointer-events:none;opacity:0;transition:opacity .25s;
    transform:translateX(-50%);white-space:nowrap;
  }
  #tooltip.show{opacity:1;}

  /* ── Intro cinematic text ── */
  #intro-text{
    position:fixed;inset:0;z-index:300;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .intro-line{
    font-family:'Georgia',serif;font-size:1.8rem;color:#f0c070;
    letter-spacing:.12em;text-shadow:0 0 40px rgba(200,130,30,.6);
    opacity:0;transform:translateY(20px);
    transition:opacity 1s, transform 1s;
    text-align:center;
  }
  .intro-line.show{opacity:1;transform:none;}
  .intro-line.hide{opacity:0;transform:translateY(-20px);}
</style>

//  THREE.JS SCENE SETUP
// ─────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0f07);
scene.fog = new THREE.Fog(0x1a0f07, 12, 30);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.05, 60);
camera.position.set(0, 1.65, 5.5);
camera.lookAt(0, 1.5, 0);

// ─────────────────────────────────────────
//  TEXTURE HELPERS
// ─────────────────────────────────────────
function makeCanvas(w,h,fn){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const ctx=c.getContext('2d'); fn(ctx,c); return c;
}
function canvasTex(w,h,fn){
  const t=new THREE.CanvasTexture(makeCanvas(w,h,fn));
  t.encoding=THREE.sRGBEncoding; return t;
}

// Wood texture
const woodTex = canvasTex(256,256,(ctx)=>{
  const g=ctx.createLinearGradient(0,0,256,256);
  g.addColorStop(0,'#7a4a20'); g.addColorStop(.4,'#8b5530'); g.addColorStop(1,'#6a3e18');
  ctx.fillStyle=g; ctx.fillRect(0,0,256,256);
  ctx.strokeStyle='rgba(50,25,8,.3)';
  for(let i=0;i<20;i++){ctx.lineWidth=Math.random()*2;ctx.beginPath();ctx.moveTo(0,i*14+Math.random()*6);ctx.lineTo(256,i*14+Math.random()*10);ctx.stroke();}
});
woodTex.wrapS=woodTex.wrapT=THREE.RepeatWrapping; woodTex.repeat.set(2,2);

// Floor wood (darker)
const floorTex = canvasTex(512,512,(ctx)=>{
  ctx.fillStyle='#4a2e10'; ctx.fillRect(0,0,512,512);
  for(let i=0;i<8;i++){
    const y=i*64; ctx.fillStyle=i%2?'#3e2608':'#46290e';
    ctx.fillRect(0,y,512,64);
  }
  ctx.strokeStyle='rgba(20,10,2,.5)';
  for(let i=0;i<30;i++){ctx.lineWidth=.5+Math.random();ctx.beginPath();ctx.moveTo(0,Math.random()*512);ctx.lineTo(512,Math.random()*512);ctx.stroke();}
});
floorTex.wrapS=floorTex.wrapT=THREE.RepeatWrapping; floorTex.repeat.set(4,4);

// Wall plaster
const wallTex = canvasTex(512,512,(ctx)=>{
  ctx.fillStyle='#c8a878'; ctx.fillRect(0,0,512,512);
  for(let i=0;i<2000;i++){
    const x=Math.random()*512,y=Math.random()*512,r=Math.random()*2;
    ctx.fillStyle=`rgba(${Math.random()>0.5?180:220},${Math.random()>0.5?140:170},${Math.random()>0.5?90:110},.07)`;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
});
wallTex.wrapS=wallTex.wrapT=THREE.RepeatWrapping; wallTex.repeat.set(3,2);

// Ceiling
const ceilTex = canvasTex(256,256,(ctx)=>{
  ctx.fillStyle='#e8dcc8'; ctx.fillRect(0,0,256,256);
  for(let i=0;i<500;i++){
    ctx.fillStyle='rgba(180,160,120,.04)'; const x=Math.random()*256,y=Math.random()*256;
    ctx.fillRect(x,y,Math.random()*3,Math.random()*3);
  }
});
ceilTex.wrapS=ceilTex.wrapT=THREE.RepeatWrapping; ceilTex.repeat.set(2,2);

// Book spine texture factory
function makeBookSpineTex(title, color){
  return canvasTex(64,256,(ctx)=>{
    const r=(color>>16)&255, g=(color>>8)&255, b=color&255;
    ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(0,0,64,256);
    // darker edge
    const grd=ctx.createLinearGradient(0,0,64,0);
    grd.addColorStop(0,'rgba(0,0,0,.35)'); grd.addColorStop(.3,'rgba(0,0,0,.05)');
    grd.addColorStop(1,'rgba(0,0,0,.2)'); ctx.fillStyle=grd; ctx.fillRect(0,0,64,256);
    // gold band

  });
}

const partPositions=new Float32Array(particleCount*3);
for(let i=0;i<particleCount;i++){
  partPositions[i*3]=( Math.random()-.5)*10;
  partPositions[i*3+1]=Math.random()*3.2+.2;
  partPositions[i*3+2]=(Math.random()-.5)*12;
}
const partGeo=new THREE.BufferGeometry(); partGeo.setAttribute('position',new THREE.BufferAttribute(partPositions,3));
const partMat=new THREE.PointsMaterial({color:0xffe8a0,size:.015,transparent:true,opacity:.4});
const particles=new THREE.Points(partGeo,partMat);
scene.add(particles);

// ─────────────────────────────────────────
//  CAMERA / MOVEMENT SYSTEM
// ─────────────────────────────────────────
let targetPos=new THREE.Vector3(0,1.65,5.0);
let currentPos=new THREE.Vector3(0,1.65,5.0);
let yaw=Math.PI; // looking into room
let pitch=-.05;
let targetYaw=Math.PI;
let targetPitch=-.05;

const MOVE_SPEED=.055;
const SMOOTH=.08;
const YAW_SMOOTH=.1;

const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Mouse drag
let isDragging=false, lastX=0, lastY=0;
canvas.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;});
document.addEventListener('mouseup',()=>isDragging=false);
document.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  targetYaw-=dx*.003;
  targetPitch=Math.max(-.6,Math.min(.45,targetPitch-dy*.003));
});

// Touch
let touchId=null, touchX=0, touchY=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){touchId=e.touches[0].identifier;touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;}
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===touchId){
      const dx=t.clientX-touchX, dy=t.clientY-touchY;
      touchX=t.clientX;touchY=t.clientY;
      targetYaw-=dx*.003;
      targetPitch=Math.max(-.6,Math.min(.45,targetPitch-dy*.003));
    }
  }
},{passive:true});
canvas.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){if(t.identifier===touchId)touchId=null;}
},{passive:true});

// Room bounds
const BOUNDS={xMin:-5.3,xMax:5.3,zMin:-6.8,zMax:6.0};

function updateMovement(){
  const dir=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
  const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  let moved=false;
  if(keys['KeyW']||keys['ArrowUp']){targetPos.addScaledVector(dir,-MOVE_SPEED);moved=true;}
  if(keys['KeyS']||keys['ArrowDown']){targetPos.addScaledVector(dir,MOVE_SPEED);moved=true;}
  if(keys['KeyA']||keys['ArrowLeft']){targetPos.addScaledVector(right,-MOVE_SPEED);moved=true;}
  if(keys['KeyD']||keys['ArrowRight']){targetPos.addScaledVector(right,MOVE_SPEED);moved=true;}
  targetPos.x=Math.max(BOUNDS.xMin,Math.min(BOUNDS.xMax,targetPos.x));
  targetPos.z=Math.max(BOUNDS.zMin,Math.min(BOUNDS.zMax,targetPos.z));
  targetPos.y=1.65;
}

// ─────────────────────────────────────────
//  RAYCASTING / HOVER / CLICK
// ─────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
let hoveredMesh=null;

function getHotMeshes(){return hotspots.map(h=>h.mesh).concat([tvHotMesh,dlHotMesh]);}

canvas.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects=raycaster.intersectObjects(hotspots.map(h=>h.mesh),false);
  if(intersects.length>0 && !isDragging){
    const mesh=intersects[0].object;
    hoveredMesh=mesh;
    const lbl=mesh.userData.label||mesh.userData.bookId;
    tooltip.textContent=lbl;
    tooltip.style.left=e.clientX+'px';
    tooltip.style.top=(e.clientY-40)+'px';
    tooltip.classList.add('show');
    canvas.style.cursor='pointer';
  } else {
    hoveredMesh=null;
    tooltip.classList.remove('show');
    canvas.style.cursor=isDragging?'grabbing':'grab';
  }
});

canvas.addEventListener('click',e=>{
  if(isDragging)return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects=raycaster.intersectObjects(hotspots.map(h=>h.mesh),false);
  if(intersects.length>0){
    const mesh=intersects[0].object;
    if(mesh.userData.isBook) openBook(mesh.userData.bookId);
    else if(mesh.userData.isDownload) openDownloads();
  }
});

// touch tap
let touchMoved=false;
canvas.addEventListener('touchstart',()=>{touchMoved=false;},{passive:true});
canvas.addEventListener('touchmove',()=>{touchMoved=true;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(touchMoved)return;
  const t=e.changedTouches[0];
  mouse.x=(t.clientX/window.innerWidth)*2-1;
  mouse.y=-(t.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects=raycaster.intersectObjects(hotspots.map(h=>h.mesh),false);
  if(intersects.length>0){
    const mesh=intersects[0].object;
    if(mesh.userData.isBook) openBook(mesh.userData.bookId);
    else if(mesh.userData.isDownload) openDownloads();
  }
},{passive:true});

// ─────────────────────────────────────────
//  OVERLAY LOGIC
// ─────────────────────────────────────────
function openBook(id){
  const bk=BOOKS.find(b=>b.id===id);
  if(!bk)return;
  document.getElementById('ov-title').textContent=bk.title;
  document.getElementById('ov-sub').textContent=bk.sub;
  document.getElementById('ov-body').innerHTML=bk.body;
  document.getElementById('overlay').classList.add('show');
}

function openDownloads(){
  document.getElementById('ov-title').textContent='Download Family Academy';
  document.getElementById('ov-sub').textContent='Install on any device';
  const dl=window.FA_DOWNLOADS;
  let html='<div class="dl-section-title">📱 Student Client Apps</div><div class="dl-grid">';
  Object.values(dl.client).forEach(d=>{
    html+=`<a href="${d.url}" class="dl-btn" target="_blank" rel="noopener"><span class="icon">${d.icon}</span>${d.label}</a>`;
  });
  html+='</div><div class="dl-section-title">📺 TV & Big Screen</div><div class="dl-grid">';
  Object.values(dl.tv).forEach(d=>{
    html+=`<a href="${d.url}" class="dl-btn" target="_blank" rel="noopener"><span class="icon">${d.icon}</span>${d.label}</a>`;
  });
  html+='</div>';
  document.getElementById('ov-body').innerHTML=html;
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('overlay-close').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('show');
});

// ─────────────────────────────────────────
//  ZONE SYSTEM
// ─────────────────────────────────────────
const zones=[
  {z:4.5,label:''},
  {z:2.5,label:'Study Desk'},
  {z:-2,label:'The Bookshelves'},
  {z:-5,label:'TV Corner'},
  {z:-6.5,label:'Downloads & Support'},
];
let currentZone='';
const zoneEl=document.getElementById('zone-label');

function updateZone(){
  const z=currentPos.z;
  let label='';
  for(const zn of zones){if(z<zn.z){label=zn.label;}}
  if(label!==currentZone){
    currentZone=label;
    zoneEl.classList.remove('show');
    if(label){
      setTimeout(()=>{zoneEl.textContent=label;zoneEl.classList.add('show');},300);
      setTimeout(()=>zoneEl.classList.remove('show'),3000);
    }
  }
}

// ─────────────────────────────────────────
//  INTRO CINEMATIC
// ─────────────────────────────────────────
let introPhase=0;
const il1=document.getElementById('il1');
const il2=document.getElementById('il2');

// Camera intro animation: starts far back, moves in
let introTime=0;
const INTRO_DURATION=4.5;
let introActive=true;
const introStartZ=8;
const introEndZ=5.0;

function stepIntro(dt){
  introTime+=dt;
  const t=Math.min(introTime/INTRO_DURATION,1);
  const ease=1-Math.pow(1-t,3);
  if(introActive){
    targetPos.z=introStartZ+(introEndZ-introStartZ)*ease;
  }
  // text phases
  if(introTime>.4 && introPhase===0){introPhase=1;il1.classList.add('show');il2.classList.add('show');}
  if(introTime>2.8 && introPhase===1){introPhase=2;il1.classList.add('hide');il2.classList.add('hide');}
  if(introTime>INTRO_DURATION){
    introActive=false;
    document.getElementById('hud').classList.add('show');
    document.getElementById('crosshair').classList.add('show');
  }
}

// ─────────────────────────────────────────
//  ANIMATE PARTICLES
// ─────────────────────────────────────────
function animateParticles(t){
  const pos=partGeo.attributes.position.array;
  for(let i=0;i<particleCount;i++){
    pos[i*3+1]+=Math.sin(t*.3+i*.4)*.0004;
    pos[i*3]+=Math.cos(t*.2+i*.3)*.0002;
    if(pos[i*3+1]>3.4)pos[i*3+1]=.2;
  }
  partGeo.attributes.position.needsUpdate=true;
}

// ─────────────────────────────────────────
//  ANIMATE LIGHTS (flicker / pulse)
// ─────────────────────────────────────────
function animateLights(t){
  deskLight.intensity=1.5+Math.sin(t*1.3)*.12;
  tvGlow.intensity=.55+Math.sin(t*.8)*.08;
  bsLampLight.intensity=.75+Math.sin(t*1.7)*.1;
  mainLight.intensity=2.1+Math.sin(t*.5)*.07;
}

// ─────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────
let lastTime=0;
function render(time){
  requestAnimationFrame(render);
  const dt=(time-lastTime)/1000; lastTime=time;
  const t=time*.001;

  if(introActive) stepIntro(dt);
  else updateMovement();

  // Smooth camera
  currentPos.lerp(targetPos,SMOOTH);
  yaw+=(targetYaw-yaw)*YAW_SMOOTH;
  pitch+=(targetPitch-pitch)*YAW_SMOOTH;

  camera.position.copy(currentPos);
  // head bob
  if(!introActive){
    const moving=keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight'];
    camera.position.y=currentPos.y+Math.sin(t*4)*(moving?.015:0);
  }

  const cosPitch=Math.cos(pitch);
  camera.lookAt(
    camera.position.x+Math.sin(yaw)*cosPitch,
    camera.position.y+Math.sin(pitch),
    camera.position.z+Math.cos(yaw)*cosPitch
  );

  animateParticles(t);
  animateLights(t);
  updateZone();

  // Hover pulse on books
  bookMeshes.forEach(m=>{
    if(m===hoveredMesh){
      m.position.z=Math.sin(t*4)*.015+.015;
    } else {
      m.position.z*=.9;
    }
  });

  renderer.render(scene,camera);
}

// ─────────────────────────────────────────
//  LOADER PROGRESS
// ─────────────────────────────────────────
const loaderBar=document.getElementById('loader-bar');
let loadPct=0;
const loadInterval=setInterval(()=>{
  loadPct=Math.min(loadPct+Math.random()*14+2,100);
  loaderBar.style.width=loadPct+'%';
  if(loadPct>=100){
    clearInterval(loadInterval);
    setTimeout(()=>{
      document.getElementById('loader').classList.add('fade-out');
      setTimeout(()=>{document.getElementById('loader').style.display='none';},1300);
    },400);
  }
},80);

// Kick off render
requestAnimationFrame(render);
</script>
